<!DOCTYPE html>
<html lang="en">
<head>
<title>Fetch JSON Example</title>
<style>
body{
font-family: Arial;
text-align:center;
padding:40px;
}
button{
padding:10px 20px;
font-size:16px;
}
</style>
</head>

<body>

<h1>Fetch JSON Data</h1>
<button id="load">Load Users</button>

<ul id="output"></ul>

<script>

document.querySelector("#load").addEventListener("click", () => {

fetch("https://jsonplaceholder.typicode.com/users")
.then(response => response.json())
.then(data => {

let html = ""

data.forEach(user => {
html += `<li>${user.name} - ${user.email}</li>`
})

document.querySelector("#output").innerHTML = html

})

})

</script>

<style>

body{
font-family: Arial;
padding:20px;
}

button{
margin:10px;
padding:10px;
}

.grid{
display:grid;
grid-template-columns: repeat(auto-fill,minmax(200px,1fr));
gap:15px;
margin-top:20px;
}

.card{
border:1px solid #ddd;
padding:10px;
border-radius:8px;
text-align:center;
}

img{
width:100px;
}

</style>

</head>

<body>

<h1>Remote APIs</h1>

<h2>Countries</h2>

<label for="regionSelect">Region:</label>
<select id="regionSelect" title="Select a region">
<option value="europe">Europe</option>
<option value="asia">Asia</option>
<option value="africa">Africa</option>
<option value="americas">Americas</option>
</select>

<button id="countriesBtn">Fetch Countries</button>

<h2>Users</h2>

<button id="usersBtn">Fetch Users</button>

<h2>Rick & Morty Characters</h2>

<input type="text" id="characterInput" placeholder="Search character">
<button id="rickBtn">Search Character</button>

<div id="results" class="grid"></div>

<script src="script.js"></script>

</body>
</html>
